# nginx config para MIT Interiorismo web
# Optimizado para: static site, Brotli/Gzip, cache agresivo, security headers

# Compresión Brotli (si está disponible) + Gzip fallback
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/json
  application/javascript
  application/xml+rss
  application/atom+xml
  image/svg+xml
  application/font-woff
  font/woff2;

# Tipos MIME explícitos (algunos clientes los necesitan)
types {
  font/woff2 woff2;
  image/avif avif;
  image/webp webp;
}
server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Permitted-Cross-Domain-Policies "none" always;

  # HSTS — solo si sirves por HTTPS (Coolify/Traefik lo añade)
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Content Security Policy
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # Cache agresivo para assets con hash
  location ~* \.(js|css|woff2|woff|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
  }

  # Cache medio para imágenes
  location ~* \.(avif|webp|jpg|jpeg|png|gif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # Cache HTML mínimo (Astro genera con hashes)
  location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }

  # Pre-compressed assets servidos primero si existen
  location ~* \.(js|css|html|svg)$ {
    gzip_static on;
    add_header Vary "Accept-Encoding";
  }

  # SPA fallback — todas las rutas devuelven index.html (Astro static)
  # Las rutas dinámicas como /proyectos/[slug] se sirven desde su HTML estático
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Proxy /api/* al backend Node.js (mit-contact-api en contenedor separado)
  location /api/ {
    proxy_pass http://10.0.1.15:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 12s;
  }

  # Robots y sitemap
  location = /robots.txt {
    add_header Cache-Control "public, max-age=86400";
  }

  location = /sitemap.xml {
    add_header Cache-Control "public, max-age=3600";
  }

  # Favicon
  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  # 404 custom
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  # Ocultar versión de nginx
  server_tokens off;
}